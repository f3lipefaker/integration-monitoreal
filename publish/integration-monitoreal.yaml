apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-monitoreal
  namespace: viptech
  labels:
    app: integration-monitoreal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: integration-monitoreal
  template:
    metadata:
      labels:
        app: integration-monitoreal
    spec:
      containers:
        - name: integration-monitoreal
          image: juca266/integration-monitoreal:latest
          ports:
            - containerPort: 4000
          env:
            - name: TZ
              value: America/Sao_Paulo
          volumeMounts:
            - name: tz-config
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: tz-config
          hostPath:
            path: /etc/localtime